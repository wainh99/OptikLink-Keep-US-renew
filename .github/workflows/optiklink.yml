name: 🎮 OptikLink-Keep

on:
  schedule:
    - cron: '0 1 */2 * *'
  workflow_dispatch:

jobs:
  keepalive:
    name: 🔄 执行保活
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 安装依赖
        run: npm install

      - name: 🌐 安装 Playwright 浏览器
        run: npx playwright install chromium --with-deps

      - name: 🛡️ 启动 Xray 代理转发 (SOCKS5)
        env:
          SOCKS_LINK: ${{ secrets.SOCKS_LINK }}
        run: |
          if [ -z "$SOCKS_LINK" ]; then
            echo "❌ 未配置 SOCKS_LINK，保活必须使用代理，中断运行！"
            exit 1
          fi

          echo "📥 下载 Xray 二进制文件..."
          XRAY_VER=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          echo "📦 Xray 最新版本: $XRAY_VER"
          wget -q "https://github.com/XTLS/Xray-core/releases/download/${XRAY_VER}/Xray-linux-64.zip"
          
          echo "📦 解压 Xray..."
          unzip -q Xray-linux-64.zip -d xray_bin
          chmod +x ./xray_bin/xray
          
          echo "🛠️ 转换为本地 HTTP 代理配置..."
          node -e "
          try {
            const rawLink = process.env.SOCKS_LINK;
            const url = new URL(rawLink);
            
            let username = url.username;
            let password = url.password;
            
            if (username && !password) {
              const decoded = Buffer.from(username, 'base64').toString('utf-8');
              if (decoded.includes(':')) {
                [username, password] = decoded.split(':');
              }
            }

            const config = {
              log: { logLevel: 'warning' },
              inbounds: [{
                port: 8080,
                listen: '127.0.0.1',
                protocol: 'http',
                settings: { auth: 'noauth', udp: true }
              }],
              outbounds: [{
                protocol: 'socks',
                settings: {
                  servers: [{
                    address: url.hostname,
                    port: parseInt(url.port || '1080'),
                    users: username ? [{ user: username, pass: password }] : []
                  }]
                }
              }]
            };
            
            // 直接写在根目录，避免切路径问题
            require('fs').writeFileSync('xray_config.json', JSON.stringify(config, null, 2));
            console.log('✅ 配置文件生成成功');
          } catch (err) {
            console.error('❌ 解析 SOCKS 链接失败:', err.message);
            process.exit(1);
          }
          "

          echo "🚀 使用绝对路径后台启动 Xray..."
          # 不再 cd，直接在根目录拉起进程，防止工作目录丢失导致崩溃
          nohup ./xray_bin/xray run -c xray_config.json > xray.log 2>&1 &
          
          echo "⏳ 等待 5 秒完成握手..."
          sleep 5

          echo "🔍 检查 Xray 进程是否存在:"
          ps aux | grep xray

          echo "✅ 测试代理连通性..."
          PROXY_IP=$(curl -s -x http://127.0.0.1:8080 --max-time 10 https://api.ipify.org)
          if [ -z "$PROXY_IP" ]; then
            echo "❌ 错误: 代理测试未通！可能是该 SOCKS5 节点在当前网络不可用或已失效。"
            echo "📋 Xray 错误日志详情:"
            cat xray.log
            exit 1
          else
            echo "🎉 代理成功接入！当前出口 IP 变为: $(echo $PROXY_IP | sed 's/\([0-9]*\.[0-9]*\.[0-9]*\.\)[0-9]*/\1**/g')"
          fi

      - name: 🚀 运行保活脚本
        env:
          DISCORD_ACCOUNT: ${{ secrets.DISCORD_ACCOUNT }}
          PANEL_ACCOUNT:   ${{ secrets.PANEL_ACCOUNT }}
          TG_BOT:          ${{ secrets.TG_BOT }}
          GOST_PROXY:      http://127.0.0.1:8080
        run: npx playwright test

      - name: 📸 上传失败截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: test-results/
          retention-days: 7
