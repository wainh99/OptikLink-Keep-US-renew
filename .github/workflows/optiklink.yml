name: 🎮 OptikLink-Keep

on:
  schedule:
    - cron: '0 1 */2 * *'
  workflow_dispatch:

jobs:
  keepalive:
    name: 🔄 执行保活
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 安装依赖
        run: npm install

      - name: 🌐 安装 Playwright 浏览器
        run: npx playwright install chromium --with-deps

      - name: 🛡️ 启动 Xray 代理转发 (SOCKS5)
        env:
          SOCKS_LINK: ${{ secrets.SOCKS_LINK }}
        run: |
          if [ -z "$SOCKS_LINK" ]; then
            echo "⚠️ 未配置 SOCKS_LINK，跳过代理启动，降级为直连"
            exit 0
          fi

          echo "📥 下载 Xray 二进制文件..."
          XRAY_VER=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          echo "📦 Xray 最新版本: $XRAY_VER"
          wget -q "https://github.com/XTLS/Xray-core/releases/download/${XRAY_VER}/Xray-linux-64.zip"
          
          echo "📦 解压 Xray..."
          unzip -q Xray-linux-64.zip -d xray_bin
          chmod +x ./xray_bin/xray
          
          echo "🛠️ 转换为本地 HTTP 代理配置..."
          node -e "
          try {
            const rawLink = process.env.SOCKS_LINK;
            // 解析 socks:// 链接
            const url = new URL(rawLink);
            
            // 处理 Base64 加密的用户名密码 (YmI0MjQyNjA6MDY2YWIzNzhiNzdk -> bb424260:066ab378b77d)
            let username = url.username;
            let password = url.password;
            
            if (username && !password) {
              const decoded = Buffer.from(username, 'base64').toString('utf-8');
              if (decoded.includes(':')) {
                [username, password] = decoded.split(':');
              }
            }

            const config = {
              log: { logLevel: 'warning' },
              inbounds: [{
                port: 8080,
                listen: '127.0.0.1',
                protocol: 'http',
                settings: { auth: 'noauth', udp: true }
              }],
              outbounds: [{
                protocol: 'socks',
                settings: {
                  servers: [{
                    address: url.hostname,
                    port: parseInt(url.port || '1080'),
                    users: username ? [{ user: username, pass: password }] : []
                  }]
                }
              }]
            };
            
            require('fs').writeFileSync('./xray_bin/xray_config.json', JSON.stringify(config, null, 2));
            console.log('✅ 配置文件生成成功');
          } catch (err) {
            console.error('❌ 解析 SOCKS 链接失败:', err.message);
            process.exit(1);
          }
          "

          echo "🚀 在专属目录中启动 Xray 服务..."
          cd xray_bin
          nohup ./xray run -c xray_config.json > xray.log 2>&1 &
          cd ..
          sleep 5

          echo "✅ Xray 已启动，测试代理连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org || echo "❌ 代理测试未通，请检查节点可用性"

      - name: 🚀 运行保活脚本
        env:
          DISCORD_ACCOUNT: ${{ secrets.DISCORD_ACCOUNT }}
          PANEL_ACCOUNT:   ${{ secrets.PANEL_ACCOUNT }}
          TG_BOT:          ${{ secrets.TG_BOT }}
          GOST_PROXY:      http://127.0.0.1:8080
        run: npx playwright test

      - name: 📸 上传失败截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: test-results/
          retention-days: 7
