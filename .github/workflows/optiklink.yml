name: 🎮 OptikLink-Keep
on:
  schedule:
    - cron: '0 1 */2 * *'
  workflow_dispatch:
jobs:
  keepalive:
    name: 🔄 执行保活
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 安装依赖
        run: npm install

      - name: 🌐 安装 Playwright 浏览器
        run: npx playwright install chromium --with-deps

      # 新增：一键安装 Xray-core
      - name: 🛰️ 安装 Xray-Core
        run: |
          bash -c "$(curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh)" @ install

      # 代理启动分支：优先VLESS节点，无节点则走原有GOST_PROXY
      - name: 🛡️ 启动 Xray + GOST（VLESS-XHTTP节点）
        if: ${{ secrets.VLESS_WS_NODE != '' }}
        env:
          VLESS_WS_NODE: ${{ secrets.VLESS_WS_NODE }}
        run: |
          # 后台静默运行xray，脚本内部会自动读取VLESS_WS_NODE生成配置并拉起xray进程
          echo "✅ 检测到VLESS-XHTTP节点，交由JS脚本内部管理Xray+GOST进程"
          sleep 2

      - name: 🛡️ 启动 GOST 代理转发（原有外部代理兼容）
        if: ${{ secrets.VLESS_WS_NODE == '' && secrets.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org | sed 's/\([0-9]*\.[0-9]*\.[0-9]*\.\)[0-9]*/\1**/g'

      - name: 🚀 运行保活脚本
        env:
          DISCORD_ACCOUNT: ${{ secrets.DISCORD_ACCOUNT }}
          PANEL_ACCOUNT:   ${{ secrets.PANEL_ACCOUNT }}
          TG_BOT:          ${{ secrets.TG_BOT }}
          GOST_PROXY:      http://127.0.0.1:8080
          # 注入VLESS节点环境变量给JS脚本读取
          VLESS_WS_NODE:   ${{ secrets.VLESS_WS_NODE }}
        run: npx playwright test

      - name: 📸 上传失败截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: test-results/
          retention-days: 7
